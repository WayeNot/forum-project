<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Paramètres - ForumPlus</title>
        <link rel="stylesheet" href="/static/css/style.css?v=2">
        <link rel="stylesheet" href="/static/css/auth.css?v=2">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>

    <body>
        <div class="auth-wrapper">
            <div class="authForm">
                <div style="text-align: center; margin-bottom: 1rem;">
                    <a href="/" style="font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"><i class="fa-solid fa-comments"></i> ForumPlus</a>
                </div>
                
                <h2 class="login-title">Paramètres</h2>
                <p class="auth-subtitle">Gérez votre compte et vos préférences.</p>
                
                <form action="/settings" method="post" class="auth-form">
                    <div class="input-group">
                        <input class="form-input" name="bio" placeholder="Modifier votre Bio" type="text" />
                    </div>
                    
                    <button type="submit" class="btn-submit">Sauvegarder <i class="fa-solid fa-save"></i></button>
                    
                    <div class="form-links">
                        <a href="/" class="form-link">Retour à l'accueil</a>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
