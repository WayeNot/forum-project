<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Erreur sur le site SoundPulse.">
    <title>Erreur {{.StatusCode}} - SoundPulse</title>
    <link rel="stylesheet" href="/static/css/style.css?v=3">
    <link rel="stylesheet" href="/static/css/auth.css?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="theme-default">
    <div class="auth-wrapper">
        <main class="authForm error-page">
            <div class="error-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true" width="64" height="64">
                    <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8zm1-13h-2v6h2zm0 8h-2v2h2z"/>
                </svg>
            </div>
            
            <h1 class="login-title error-title">Erreur {{.StatusCode}}</h1>
            <p class="auth-subtitle error-subtitle">{{.Message}}</p>
            
            <div class="error-actions">
                <a href="/" class="btn-submit">
                    <i class="fa-solid fa-house" aria-hidden="true"></i> Retour à l'accueil
                </a>
            </div>
        </main>
    </div>
    <style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</body>

</html>
