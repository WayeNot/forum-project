<!DOCTYPE html>
<html lang="fr">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum Plus</title>
    <link rel="stylesheet" href="/static/css/output.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <nav class="flex justify-between items-center p-4 text-white/40">

            <a class="cursor-pointer transition duration-500 hover:text-white/90" href="/contact">Nous contacter</a>
            {{if .IsLogged}}
            <a class="cursor-pointer transition duration-500 hover:text-white/90" href="/logout">Logout</a>
            {{else}}
            <a class="cursor-pointer transition duration-500 hover:text-white/90" href="/login">Connexion</a>
            {{end}}
        </div>
    </nav>
</body>

</html>
