<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Modifiez votre publication existante sur SoundPulse.">
    <title>Modifier le Post - SoundPulse</title>
    <link rel="stylesheet" href="/static/css/style.css?v=3">
    <link rel="stylesheet" href="/static/css/home.css?v=3">
    <link rel="stylesheet" href="/static/css/creator.css?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

{{if .IsLogged}}<body class="theme-{{.UserData.ProfileTheme}}">{{else}}<body class="theme-default">{{end}}
    <header class="header-navbar">
        <div class="navbar-container">
            <a href="/" class="nav-logo" aria-label="SoundPulse Accueil">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 2a10 10 0 0 0-10 10v7a3 3 0 0 0 3 3h3v-8H5v-2a7 7 0 1 1 14 0v2h-3v8h3a3 3 0 0 0 3-3v-7A10 10 0 0 0 12 2zm-6 18H5a1 1 0 0 1-1-1v-5h2zm14-1a1 1 0 0 1-1 1h-1v-6h2z"/>
                </svg>
                <span>SoundPulse</span>
            </a>
            <nav class="nav-links" aria-label="Navigation principale">
                <a href="/"><i class="fa-solid fa-house" aria-hidden="true"></i> <span>Accueil</span></a>
                {{if .IsLogged}}
                <a href="/createPost"><i class="fa-solid fa-plus" aria-hidden="true"></i> <span>Créer</span></a>
                <a href="/createTag"><i class="fa-solid fa-hashtag" aria-hidden="true"></i> <span>Tag</span></a>
                <a href="/settings" aria-label="Paramètres du compte"><i class="fa-solid fa-user-gear" aria-hidden="true"></i> <span>Paramètres</span></a>
                <a href="/logout" class="logout-btn"><i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i> <span>Déconnexion</span></a>
                {{end}}
            </nav>
        </div>
    </header>

    <main class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-section">
                <a href="/" class="tag-item" style="width: 100%;">
                    <i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Accueil
                </a>
            </div>
        </aside>

        <div class="content-area">
            <section class="form-container">
                <h1 class="form-title">Modifier votre publication</h1>
                <p class="form-subtitle">Mettez à jour le contenu de votre post.</p>

                {{if .Error}}
                <div class="form-error" role="alert">
                    <i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i> {{.Error}}
                </div>
                {{end}}

                <form id="editPostForm" action="/post/edit?id={{.PostID}}" method="post">
                    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                    
                    <div class="form-group">
                        <label for="title">Titre du poste</label>
                        <input class="inputText" id="title" required name="title" value="{{.Title}}" placeholder="Titre" type="text" />
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Description / Contenu</label>
                        <textarea name="description" id="description" class="textarea" required placeholder="Contenu">{{.Description}}</textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Sélectionner des tags</label>
                        <input type="text" id="tagSearch" placeholder="🔍 Rechercher un tag..." class="inputText" style="margin-bottom: 0.5rem; font-size: 0.85rem; padding: 0.5rem 0.75rem;" onkeyup="filterTagsSearch()" aria-label="Rechercher un tag">
                        <div id="genresCheckboxGroup" data-selected="{{.Tags}}" style="display: flex; flex-wrap: wrap; gap: 0.5rem; max-height: 150px; overflow-y: auto; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: rgba(255, 255, 255, 0.01);">
                            {{range .AllTags}}
                            <label class="checkbox-label tag-checkbox-item" style="width: fit-content; display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.4rem 0.8rem; font-size: 0.85rem; border-radius: var(--radius-sm);">
                                <input type="checkbox" name="tags" value="{{.}}"> {{.}}
                            </label>
                            {{else}}
                            <p style="color: var(--text-muted); font-size: 0.95rem; width: 100%;">Aucun tag disponible.</p>
                            {{end}}
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="media">Lien de l'image (optionnel)</label>
                        <input class="inputText" id="media" name="media" value="{{.ImageURL}}" placeholder="URL de l'image" type="text" />
                    </div>

                    <button type="submit" class="btn-submit-creator">
                        <i class="fa-solid fa-floppy-disk" aria-hidden="true"></i> Enregistrer les modifications
                    </button>
                </form>
            </section>
        </div>
    </main>
    <script>
        const group = document.getElementById('genresCheckboxGroup');
        const selected = group.getAttribute('data-selected');
        if (selected) {
            const list = selected.split(',');
            const checkboxes = group.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(cb => {
                if (list.includes(cb.value)) {
                    cb.checked = true;
                }
            });
        }

        function filterTagsSearch() {
            var input = document.getElementById('tagSearch');
            var filter = input.value.toLowerCase();
            var items = document.getElementsByClassName('tag-checkbox-item');
            for (var i = 0; i < items.length; i++) {
                var text = items[i].textContent || items[i].innerText;
                if (text.toLowerCase().indexOf(filter) > -1) {
                    items[i].style.display = "";
                } else {
                    items[i].style.display = "none";
                }
            }
        }
    </script>
</body>

</html>
