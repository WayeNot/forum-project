<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Forum Plus - Accueil</title>
        <link rel="stylesheet" href="/static/css/style.css">
        <link rel="stylesheet" href="/static/css/output.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>

    <body class="bg-[#1e2227] text-white/90 min-h-screen flex flex-col font-sans">
        <main class="w-1/2 mx-auto my-4 flex flex-col min-h-[calc(100vh-2rem)]">
            <nav class="relative z-50 flex items-center justify-center gap-5 p-4 text-white/40">
                <a href="/" class="cursor-pointer transition duration-300 hover:text-white"><i class="fa-solid fa-house text-lg"></i></a>
                {{if .IsLogged}}
                <a href="/messages" class="cursor-pointer transition duration-500 hover:text-white/90"><i class="fa-solid fa-comment-dots text-lg"></i></a>
                <a href="/profile" class="cursor-pointer transition duration-500 hover:text-white/90"><i class="fa-solid fa-user-gear text-lg"></i></a>
                <a href="/logout" class="cursor-pointer transition duration-500 hover:text-white/90"><i class="fa-solid fa-right-from-bracket text-lg"></i></a>
                {{else}}
                <a class="cursor-pointer transition duration-500 hover:text-white/90" href="/login"><i class="fa-solid fa-person-circle-plus"></i></a>
                {{end}}
            </nav>
            <section class="flex-1 p-4">
                <h2 class="text-white/40 text-center w-full">Tous les posts ici !</h2>
            </section>
        </main>
    </body>
</html>
