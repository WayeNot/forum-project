<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum Plus</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <nav class="relative z-60 flex items-center justify-center gap-5 p-4 text-white/40">
        <a href="/" class="cursor-pointer transition duration-500 hover:text-white/90">Accueil</a>
        <a class="cursor-pointer transition duration-500 hover:text-white/90" href="/login"><i class="fa-solid fa-person-circle-plus"></i></a>
    </nav>
    <div class="fixed inset-0 bg-black/20 z-40"></div>
    <div class="fixed inset-0 z-50 flex items-center justify-center">
        <div class="w-full max-w-md bg-black/80 border border-white/70 shadow-2xl p-6 animate-fadeIn">
            <h2 class="text-[35px] font-bold text-white/70 text-center font-mono w-full mb-4">Inscription</h2>
            <hr class="text-white/70 w-4/5 my-5 m-auto" />
            <form method="post" action="/register" class="flex flex-col items-center w-4/5 m-auto gap-4">
                <div class="flex flex-col items-center justify-center gap-1 w-full">
                    <input name="username" required class="w-full border-2 font-mono text-[20px] border-white/40 text-white/80 p-1.5" placeholder="Nom d'utilisateur" type="text" maxlength={25} />
                    <input name="mail" required class="w-full border-2 font-mono text-[20px] border-white/40 text-white/80 p-1.5" placeholder="Adresse mail" type="mail" maxlength={25} />
                    <input name="password" required class="w-full border-2 font-mono text-[20px] border-white/40 text-white/80 p-1.5 mt-1" placeholder="Mot de passe" type="password" maxLength={50} />
                </div>
                <button type="submit" class="w-full cursor-pointer flex items-center justify-center gap-3 border-2 border-white/40 text-white/40 p-2 font-mono text-[20px] hover:bg-white/40 hover:border-white/40 hover:text-white transition duration-500">Enter</button>
                <a href="/login" class="cursor-pointer hover:underline hover:text-white/70 transition duration-500 text-white/20 font-mono text-[14px]">Connexion</a>
            </form>
        </div>
    </div>
</body>

</html>
