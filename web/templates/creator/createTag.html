<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un Tag - ForumPlus</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
    <link rel="stylesheet" href="/static/css/creator.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <main>
        <nav class="navbar">
            <a href="/" style="margin-right: auto; font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;"><i class="fa-solid fa-comments"></i> ForumPlus</a>
            <div class="nav-links">
                <a href="/"><i class="fa-solid fa-house"></i> <span>Accueil</span></a>
            </div>
        </nav>

        <section class="form-container">
            <h2 class="form-title">Créer un nouveau tag</h2>
            <p class="form-subtitle">Ajoutez une nouvelle catégorie pour organiser les publications.</p>

            {{if .Error}}
            <div class="form-error">
                <i class="fa-solid fa-triangle-exclamation"></i> {{.Error}}
            </div>
            {{end}}

            <form id="createTag" action="/createTag" method="post">
                <div class="form-group">
                    <label for="name">Nom du tag</label>
                    <input class="inputText" id="name" required name="name" placeholder="Ex: golang" type="text" />
                </div>
                
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea name="description" id="description" class="textarea" placeholder="Décrivez à quoi sert ce tag..."></textarea>
                </div>

                <button type="submit" class="btn-submit-creator">
                    <i class="fa-solid fa-plus"></i> Créer le tag
                </button>
            </form>
        </section>
    </main>
</body>

</html>
