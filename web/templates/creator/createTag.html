<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum Plus - Accueil</title>
    <link rel="stylesheet" href="/static/css/style.css?v=1">
    <link rel="stylesheet" href="/static/css/creator.css?v=2">
    <link rel="stylesheet" href="/static/css/home.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <main>
        <nav>
            <a href="/"><i class="fa-solid fa-house text-lg"></i></a>
            <a href="/createPost"><i class="fa-solid fa-circle-plus"></i></a>
            <a href="/messages"><i class="fa-solid fa-comment-dots text-lg"></i></a>
            <a href="/profile"><i class="fa-solid fa-user-gear text-lg"></i></a>
            <a href="/logout"><i class="fa-solid fa-right-from-bracket text-lg"></i></a>
        </nav>
        <section>
            <form id="createTag" action="/createTag" method="post">
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <input class="inputText" required name="name" placeholder="Nom du tag" type="text" />
                    <textarea name="description" class="textarea" placeholder="Description du tag"></textarea>
                </div>
                <button type="submit">Créer le tag</button>
            </form>
        </section>
    </main>
</body>

</html>
