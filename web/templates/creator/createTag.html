<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un Tag - ForumPlus</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
    <link rel="stylesheet" href="/static/css/home.css?v=2">
    <link rel="stylesheet" href="/static/css/creator.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <main class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/" class="logo">
                    <i class="fa-solid fa-music"></i>
                    <span>ForumPlus</span>
                </a>
            </div>
            
            <div class="sidebar-section">
                <a href="/" class="tag-item">
                    <i class="fa-solid fa-arrow-left"></i> Retour à l'accueil
                </a>
            </div>
        </aside>

        <div class="content-area">
            <nav class="navbar">
                <a href="/" class="nav-brand-mobile"><i class="fa-solid fa-music"></i></a>
                <div class="nav-links">
                    <a href="/"><i class="fa-solid fa-house"></i> <span>Accueil</span></a>
                </div>
            </nav>

            <section class="form-container">
                <h2 class="form-title">Créer un nouveau tag</h2>
                <p class="form-subtitle">Ajoutez un genre musical ou une catégorie d'échange.</p>

                {{if .Error}}
                <div class="form-error">
                    <i class="fa-solid fa-triangle-exclamation"></i> {{.Error}}
                </div>
                {{end}}

                <form id="createTag" action="/createTag" method="post">
                    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                    
                    <div class="form-group">
                        <label for="name">Nom du tag</label>
                        <input class="inputText" id="name" required name="name" placeholder="Ex: jazz" type="text" />
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea name="description" id="description" class="textarea" placeholder="Décrivez le genre de discussions pour ce tag..."></textarea>
                    </div>

                    <button type="submit" class="btn-submit-creator">
                        <i class="fa-solid fa-plus"></i> Créer le tag
                    </button>
                </form>
            </section>
        </div>
    </main>
</body>

</html>
