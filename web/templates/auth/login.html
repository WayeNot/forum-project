<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Connexion - ForumPlus</title>
        <link rel="stylesheet" href="/static/css/style.css?v=2">
        <link rel="stylesheet" href="/static/css/auth.css?v=2">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>

    <body>
        <div class="auth-wrapper">
            <div class="authForm">
                <div style="text-align: center; margin-bottom: 1rem;">
                    <a href="/" style="font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;"><i class="fa-solid fa-music"></i> ForumPlus</a>
                </div>
                
                <h2 class="login-title">Connexion</h2>
                <p class="auth-subtitle">Ravi de vous revoir ! Connectez-vous à votre compte.</p>
                
                {{if .Error}}
                <div class="form-error" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; padding: 0.75rem 1rem; border-radius: var(--radius-md); font-size: 0.9rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    <i class="fa-solid fa-triangle-exclamation"></i> {{.Error}}
                </div>
                {{end}}
                
                <form action="/login" method="post" class="auth-form">
                    <div class="input-group">
                        <input required class="form-input" name="usernameOrMail" placeholder="Nom d'utilisateur ou email" type="text" maxlength="25" />
                        <input required class="form-input" name="password" placeholder="Mot de passe" type="password" maxlength="50" />
                    </div>
                    
                    <button type="submit" class="btn-submit">Se connecter <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
                    
                    <div class="form-links">
                        <a href="/register" class="form-link">Créer un compte</a>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
