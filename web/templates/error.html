<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur {{.StatusCode}} - ForumPlus</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
    <link rel="stylesheet" href="/static/css/auth.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="auth-wrapper">
        <div class="authForm" style="text-align: center;">
            <div style="font-size: 4rem; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1.5rem;">
                <i class="fa-solid fa-compact-disc fa-spin" style="animation-duration: 4s;"></i>
            </div>
            
            <h2 class="login-title" style="font-size: 2.5rem; margin-bottom: 1rem;">Erreur {{.StatusCode}}</h2>
            <p class="auth-subtitle" style="font-size: 1.1rem; line-height: 1.6;">{{.Message}}</p>
            
            <div style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                <a href="/" class="btn-submit" style="text-decoration: none;">
                    <i class="fa-solid fa-house"></i> Retour à l'accueil
                </a>
            </div>
        </div>
    </div>
</body>

</html>
